<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen-Omni-Realtime Web Demo</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Qwen-Omni-Realtime</h1>
            <div class="status-badge" id="connection-status">未连接</div>
        </header>

        <div class="main-content">
            <!-- 左侧配置和视频栏 -->
            <div class="sidebar">
                <div class="card config-card">
                    <h3>配置区</h3>
                    <div class="form-group">
                        <label for="api-key">百炼 API Key (本地保存)</label>
                        <input type="password" id="api-key" placeholder="sk-..." />
                    </div>
                    
                    <div class="form-group">
                        <label for="model-select">模型选择</label>
                        <select id="model-select">
                            <option value="qwen3-omni-flash-realtime" selected>qwen3-omni-flash-realtime (经济版/你开通了这个)</option>
                            <option value="qwen3.5-omni-plus-realtime">qwen3.5-omni-plus-realtime (最强版/需较高权限)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="voice-select">发音人 (Voice)</label>
                        <select id="voice-select">
                            <option value="Cherry">Cherry (阳光积极小姐姐)</option>
                            <option value="Ethan">Ethan (活力阳光男声)</option>
                            <option value="Serena">Serena (温柔小姐姐)</option>
                            <option value="Tina">Tina (甜美客服)</option>
                            <option value="Ryan">Ryan (节奏播音男声)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="instructions">系统提示词 (角色设定)</label>
                        <textarea id="instructions" rows="3">你是一个友好的AI助手，请自然、简短地用中文回答我的问题。</textarea>
                    </div>

                    <div class="action-buttons">
                        <button id="btn-start" class="btn-primary">开始对话 (自动模式)</button>
                        <button id="btn-stop" class="btn-danger" disabled>结束对话</button>
                    </div>

                    <hr style="margin: 24px 0; border: 0; border-top: 1px solid var(--border);" />

                    <div class="upload-section">
                        <h4 style="margin-bottom: 12px; color: #e2e8f0; font-size: 1rem;">💁‍♂️ 动态录入熟人</h4>
                        <div class="form-group" style="margin-bottom: 8px;">
                            <input type="text" id="face-name" placeholder="输入姓名拼音 (如: boss)" />
                        </div>
                        <div class="form-group" style="margin-bottom: 8px;">
                            <input type="file" id="face-file" accept="image/png, image/jpeg" style="padding: 8px 0; background: transparent; border: none; cursor: pointer; color: var(--text-muted); font-size: 0.875rem;" />
                        </div>
                        <button id="btn-upload" style="width: 100%; border: 1px solid var(--border); background: #334155; color: white;">上传照片入库</button>
                        <div id="upload-status" style="font-size: 0.8rem; margin-top: 8px; color: #10b981; min-height: 18px;"></div>
                    </div>
                </div>

                <div class="card video-card">
                    <div class="video-header">
                        <h3>摄像头采集 (发送给模型)</h3>
                        <label class="switch">
                            <input type="checkbox" id="camera-toggle" checked>
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="video-container">
                        <video id="local-video" autoplay playsinline muted></video>
                        <span class="video-overlay" id="video-overlay">摄像头已关闭</span>
                        
                        <!-- 沉浸模式悬浮按钮 -->
                        <div class="floating-controls" id="floating-controls" style="display: none;">
                            <button id="btn-switch-cam" class="btn-circular btn-secondary" title="切换镜头">🔄</button>
                            <button id="btn-hangup" class="btn-circular btn-danger" title="结束通话">📞挂断</button>
                        </div>
                    </div>
                    <!-- 隐藏的 canvas 用于视频抽帧提取 JPEG -->
                    <canvas id="snapshot-canvas" style="display: none;"></canvas>
                </div>
            </div>

            <!-- 右侧对话记录 -->
            <div class="chat-area card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>对话记录</h3>
                    <div id="face-status" style="font-size: 0.85rem; color: #94a3b8;">👨‍💻 正在准备人脸模型...</div>
                </div>
                <div class="chat-log" id="chat-log">
                    <div class="system-msg">准备就绪。请确认输入 API Key 后点击"开始对话"。</div>
                </div>
                <div class="mic-status" id="mic-status">
                    <span class="mic-indicator"></span> 麦克风监听中 (VAD自动打断)
                </div>
            </div>
        </div>
    </div>

    <!-- 人脸识别所需库与核心逻辑 -->
    <script src="face-api.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
